name: Daily Meta Ads Analysis

on:
  schedule:
    - cron: '30 1 * * *' # Runs at 1:30 AM UTC (7:00 AM IST)
  workflow_dispatch: # Allows you to run it manually by clicking a button

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install facebook-business

      - name: Run AI Analysis Script
        run: python main.py

      - name: Commit and Push HTML Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Automated daily dashboard update" || exit 0
          git push
